server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip — compress HTML/JS/CSS before sending to the proxy
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 500;
    gzip_types text/html text/css application/javascript application/json text/plain;

    # Service worker — must be served with no-cache so browsers always get updates
    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # CSS/static assets — cache for 1 hour in browser
    location ~* \.(css|png|jpg|ico|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=600";
        try_files $uri =404;
    }

    # HTML — cache for 5 minutes; browser re-fetches in background while showing cached
    location = /index.html {
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=60";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
