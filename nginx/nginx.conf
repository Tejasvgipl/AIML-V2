events { worker_connections 2048; }

http {
    # ── Gzip: compress API JSON + static assets before sending over network ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_types
        application/json
        application/javascript
        text/css
        text/html
        text/plain
        text/javascript;

    # ── Docker embedded DNS ────────────────────────────────────────────────
    # CRITICAL: resolver + VARIABLE upstreams (set $x ...; proxy_pass http://$x).
    # Using a variable forces nginx to re-resolve the container IP on each
    # request via Docker DNS. Static `upstream { server backend:8000; }` blocks
    # resolve ONCE at startup, so after `docker compose up --build backend` the
    # container gets a new IP and nginx keeps hitting the dead old one -> 502.
    # This is the documented recurring-502 fix — do not switch back to upstream{}.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    log_format soc '$remote_addr $status "$request" '
                   'upstream=$upstream_addr code=$upstream_status '
                   'rt=${request_time}s urt=${upstream_response_time}s';
    access_log /var/log/nginx/access.log soc;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        set $frontend   "frontend:80";
        set $backend    "backend:8000";
        set $ml         "ml-engine:8001";
        set $clickhouse "clickhouse:8123";
        set $grafana    "grafana:3000";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout              10s;
        proxy_send_timeout                 600s;
        client_max_body_size               500M;

        # ── ClickHouse HTTP proxy ─────────────────────────────────────────
        location /ch/ {
            proxy_pass http://$clickhouse/;
            proxy_read_timeout 120s;
        }

        # ── Grafana ──────────────────────────────────────────────────────
        location /grafana/ {
            proxy_pass http://$grafana/;
            proxy_read_timeout 60s;
            proxy_set_header Host $host;
        }

        # ── API → ml-engine (variable upstream = re-resolved every request) ──
        location /api/ml/ {
            proxy_pass http://$ml;
            proxy_read_timeout 600s;
        }

        # ── API → backend (variable upstream = re-resolved every request) ──
        location /api/ {
            proxy_pass http://$backend;
            proxy_read_timeout 600s;
        }

        # ── Static frontend ──────────────────────────────────────────────
        location / {
            proxy_pass http://$frontend;
        }
    }
}
