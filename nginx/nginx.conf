events { worker_connections 1024; }

http {
    # ── Docker embedded DNS ────────────────────────────────────────────────
    # Re-resolve upstream container IPs at request time. Without this nginx
    # caches the IP at startup, and when a backend container restarts (new IP)
    # nginx keeps hitting the dead one -> permanent 502. This is THE fix.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── Readable logs to stdout/stderr (docker logs cs_nginx) ──────────────
    # Shows status + which upstream was hit + timing, so a real failure is
    # obvious instead of a blank 502.
    log_format soc '$remote_addr $status "$request" '
                   'upstream=$upstream_addr code=$upstream_status '
                   'rt=${request_time}s urt=${upstream_response_time}s';
    access_log /var/log/nginx/access.log soc;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        # Hosts kept in variables so proxy_pass uses the resolver above
        # (a literal upstream{} block would cache the IP again).
        set $backend  "backend:8000";
        set $ml       "ml-engine:8001";
        set $frontend "frontend:80";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_send_timeout    600s;
        client_max_body_size  500M;

        # When an upstream is unreachable / times out, return a CLEAR JSON
        # error (with the real status) instead of nginx's blank 502 page.
        error_page 502 504 = @upstream_down;
        location @upstream_down {
            default_type application/json;
            add_header X-Upstream-Error "$upstream_addr" always;
            return 503 '{"error":"upstream_unavailable","detail":"The API service is starting or unreachable. Check: docker compose ps / docker logs cs_backend","status":503}';
        }

        # ── ClickHouse HTTP proxy (admin raw-log viewer) ──────────────────
        set $clickhouse "clickhouse:8123";
        location /ch/ {
            proxy_pass http://$clickhouse/;
            proxy_read_timeout 120s;
        }

        # ── Grafana (proxied so frontend needs zero hardcoded ports) ──────
        set $grafana "grafana:3000";
        location /grafana/ {
            proxy_pass http://$grafana/;
            proxy_read_timeout 60s;
            proxy_set_header Host $host;
        }

        # ── API → backend (full /api/... path passed through unchanged) ────
        location /api/ml/ {
            proxy_pass http://$ml;
            proxy_read_timeout 600s;
        }
        location /api/ {
            proxy_pass http://$backend;
            proxy_read_timeout 600s;
        }

        # ── Everything else → frontend static ─────────────────────────────
        location / {
            proxy_pass http://$frontend;
        }
    }
}
