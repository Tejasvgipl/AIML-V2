events { worker_connections 2048; }

http {
    # ── Gzip: compress API JSON + static assets before sending over network ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_types
        application/json
        application/javascript
        text/css
        text/html
        text/plain
        text/javascript;

    # ── Docker embedded DNS ────────────────────────────────────────────────
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── Keepalive to backend — reuse TCP connections instead of new per request ──
    # Without this, every API call opens a new TCP connection to backend:8000.
    # With this, connections are reused → removes TCP handshake latency.
    upstream backend_pool {
        server backend:8000;
        keepalive 16;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }
    upstream ml_pool {
        server ml-engine:8001;
        keepalive 8;
        keepalive_requests 500;
        keepalive_timeout 60s;
    }

    log_format soc '$remote_addr $status "$request" '
                   'upstream=$upstream_addr code=$upstream_status '
                   'rt=${request_time}s urt=${upstream_response_time}s';
    access_log /var/log/nginx/access.log soc;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        set $frontend "frontend:80";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Keepalive headers — required for upstream keepalive to work
        proxy_set_header Connection        "";
        proxy_http_version                 1.1;
        proxy_connect_timeout              10s;
        proxy_send_timeout                 600s;
        proxy_next_upstream                error timeout http_502 http_503;
        proxy_next_upstream_tries          3;
        proxy_next_upstream_timeout        15s;
        client_max_body_size               500M;

        # ── ClickHouse HTTP proxy ─────────────────────────────────────────
        set $clickhouse "clickhouse:8123";
        location /ch/ {
            proxy_pass http://$clickhouse/;
            proxy_read_timeout 120s;
        }

        # ── Grafana ──────────────────────────────────────────────────────
        set $grafana "grafana:3000";
        location /grafana/ {
            proxy_pass http://$grafana/;
            proxy_read_timeout 60s;
            proxy_set_header Host $host;
        }

        # ── API → backend (keepalive pool) ────────────────────────────────
        location /api/ml/ {
            proxy_pass http://ml_pool;
            proxy_read_timeout 600s;
        }
        location /api/ {
            proxy_pass http://backend_pool;
            proxy_read_timeout 600s;
        }

        # ── Static frontend ──────────────────────────────────────────────
        location / {
            proxy_pass http://$frontend;
        }
    }
}
